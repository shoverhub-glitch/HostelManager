version: "3.9"

services:

  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: fast-api-backend
    restart: always
    expose:
      - "8000"
    env_file:
      - ./api/.env
    environment:
      FORWARDED_ALLOW_IPS: "*"
    volumes:
      - ./mongodb_backups:/app/backups
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  mongodb:
    image: mongo:7
    container_name: api-mongodb
    restart: always
    expose:
      - "27017"
    volumes:
      - ./mongodb_data:/data/db
    env_file:
      - ./api/.env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "mongodb://admin:securepassword06@localhost:27017/admin?authSource=admin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  nginx:
    image: nginx:alpine
    container_name: api-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge