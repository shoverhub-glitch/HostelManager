version: "3.9"

services:

  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: fast-api-backend
    restart: always
    expose:
      - "8000"
    env_file:
      - ./api/.env
    environment:
      FORWARDED_ALLOW_IPS: "*"
    volumes:
      - ./mongodb_backups:/app/backups
    depends_on:
      - mongodb
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s


  mongodb:
    image: mongo:7
    container_name: api-mongodb
    restart: always
    expose:
      - "27017"
    volumes:
      - ./mongodb_data:/data/db
    env_file:
      - ./api/.env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    networks:
      - backend-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5


  nginx:
    image: nginx:alpine
    container_name: api-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - backend-network


networks:
  backend-network:
    driver: bridge