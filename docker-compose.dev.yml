x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

services:
  mongodb:
    image: mongo:7
    container_name: dev-mongodb
    restart: unless-stopped
    expose:
      - "27017"
    ports:
      - "27057:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - dev-network
    command: >
      mongod
      --replSet rs0
      --bind_ip_all
      --noauth
    healthcheck:
      test:
        - "CMD"
        - "mongosh"
        - "--quiet"
        - "mongodb://mongodb:27017/admin"
        - "--eval"
        - "db.adminCommand('ping').ok"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *default-logging

  rs-init:
    image: mongo:7
    container_name: dev-mongodb-rs-init
    restart: "no"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - dev-network
    entrypoint: >
      mongosh
      --quiet
      "mongodb://mongodb:27017/admin"
      --eval "
        try {
          rs.status();
          print('Replica set already initiated');
        } catch(e) {
          rs.initiate({
            _id: 'rs0',
            members: [{ _id: 0, host: 'mongodb:27017' }]
          });
          print('Replica set initiated');
        }
      "
    logging: *default-logging

  backend:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: dev-backend
    restart: unless-stopped
    expose:
      - "8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MONGO_URL: mongodb://mongodb:27017
      ENVIRONMENT: development
      DEBUG: "true"
      LOG_TO_FILE: "false"
      LOG_LEVEL: "DEBUG"
    volumes:
      - ./api:/app
      - api_logs:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
      rs-init:
        condition: service_completed_successfully
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging

  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile.dev
    container_name: dev-admin-ui
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://192.168.0.105:8000/api/v1
      VITE_BASE_PATH: /
      VITE_ADMIN_SECURITY_HEADER: dev-secret
    volumes:
      - ./admin-ui:/app
      - admin_ui_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - dev-network
    logging: *default-logging

networks:
  dev-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  api_logs:
    driver: local
  admin_ui_node_modules:
    driver: local
